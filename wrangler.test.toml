name = "second-brain-test"
main = "src/worker.ts"
compatibility_date = "2024-09-01"
compatibility_flags = ["nodejs_compat", "global_fetch_strictly_public"]

[[r2_buckets]]
binding = "RAW_BUCKET"
bucket_name = "second-brain-raw"

[[d1_databases]]
binding = "DB"
database_name = "second-brain-test"
database_id = "test"
migrations_dir = "migrations"

[[kv_namespaces]]
binding = "OAUTH_KV"
id = "test-kv"

[durable_objects]
bindings = [
  { name = "SECOND_BRAIN_MCP", class_name = "SecondBrainMCP" }
]

[[migrations]]
tag = "v1"
new_sqlite_classes = ["SecondBrainMCP"]
